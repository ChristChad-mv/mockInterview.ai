# Cloud Build Staging Pipeline
# CI/CD pipeline for building, testing, and deploying mockInterview.ai to Cloud Run.
# Triggered on push to main branch.
#
# Usage:
#   gcloud builds submit --config .cloudbuild/staging.yaml
#
steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME",
      ]

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-staging
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "mockinterview-agent"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${PROJECT_ID}"
      - "--memory"
      - "4Gi"
      - "--allow-unauthenticated"
      - "--no-cpu-throttling"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},USE_VERTEXAI=True"

  # Step 4: Fetch and display the deployed service URL
  - name: "gcr.io/cloud-builders/gcloud"
    id: fetch-staging-url
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        _URL=$(gcloud run services describe mockinterview-agent \
          --region ${_REGION} --project ${PROJECT_ID} --format="value(status.url)")
        echo "_________________________________________________________________________"
        echo "✅ Deployment successful!"
        echo "🌐 Service URL: $${_URL}"
        echo "_________________________________________________________________________"

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY_REPO_NAME: mockinterview-agent
  _CONTAINER_NAME: mockinterview-agent

logsBucket: gs://${PROJECT_ID}-mockinterview-agent-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
