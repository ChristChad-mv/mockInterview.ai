# Cloud Build Production Deployment
# Deploys the pre-built image from Artifact Registry to Cloud Run (production).
#
# Usage:
#   gcloud builds submit --config .cloudbuild/deploy-to-prod.yaml
#
steps:
  # Deploy to Cloud Run (Production)
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-production
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "mockinterview-agent"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${PROJECT_ID}"
      - "--memory"
      - "4Gi"
      - "--allow-unauthenticated"
      - "--no-cpu-throttling"
      - "--labels"
      - "created-by=adk,env=production"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},USE_VERTEXAI=True"

  # Display deployed URL
  - name: "gcr.io/cloud-builders/gcloud"
    id: display-url
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        _URL=$(gcloud run services describe mockinterview-agent \
          --region ${_REGION} --project ${PROJECT_ID} --format="value(status.url)")
        echo "_________________________________________________________________________"
        echo "✅ Production deployment successful!"
        echo "🌐 Service URL: $${_URL}"
        echo "_________________________________________________________________________"

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY_REPO_NAME: mockinterview-agent
  _CONTAINER_NAME: mockinterview-agent

logsBucket: gs://${PROJECT_ID}-mockinterview-agent-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
